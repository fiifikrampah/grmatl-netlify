name: Keep Supabase Alive

# Prevents free-tier project from pausing after 7 days of inactivity
# by running a lightweight query every 5 days.

on:
  schedule:
    # Runs at 9:00 AM UTC every Monday and Friday (~5 days apart)
    - cron: '0 9 * * 1,5'
  workflow_dispatch: # Manual trigger from Actions tab

jobs:
  beat-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Touch beat table
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY secrets. Add them in repo Settings > Secrets and variables > Actions."
            exit 1
          fi
          # Write a row to beat, then delete it so the table stays clean.
          INSERT_RESPONSE=$(mktemp)
          INSERT_CODE=$(curl -sS -o "$INSERT_RESPONSE" -w "%{http_code}" \
            -X POST \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d '{}' \
            "${SUPABASE_URL}/rest/v1/beat?select=id")

          if [ "$INSERT_CODE" -lt 200 ] || [ "$INSERT_CODE" -ge 300 ]; then
            echo "Beat insert failed (HTTP $INSERT_CODE)"
            cat "$INSERT_RESPONSE"
            exit 1
          fi

          BEAT_ID=$(python3 -c 'import json, sys; data = json.load(open(sys.argv[1], encoding="utf-8")); print(data[0]["id"] if data and "id" in data[0] else sys.exit("Missing inserted beat id"))' "$INSERT_RESPONSE")

          DELETE_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X DELETE \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            "${SUPABASE_URL}/rest/v1/beat?id=eq.${BEAT_ID}")

          rm -f "$INSERT_RESPONSE"

          if [ "$DELETE_CODE" -ge 200 ] && [ "$DELETE_CODE" -lt 300 ]; then
            echo "Beat write/delete successful (insert HTTP $INSERT_CODE, delete HTTP $DELETE_CODE, id $BEAT_ID)"
          else
            echo "Beat delete failed (HTTP $DELETE_CODE, id $BEAT_ID)"
            exit 1
          fi
